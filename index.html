<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Meter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #ff8fa3;
    --text: #f0f0f0;
    --muted: #666680;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -100px; left: -100px;
    animation: float1 8s ease-in-out infinite;
  }
  body::after {
    width: 400px; height: 400px;
    background: #6c63ff;
    bottom: -100px; right: -100px;
    animation: float2 10s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
  .container { width: 100%; max-width: 460px; padding: 20px; position: relative; z-index: 1; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon { font-size: 48px; display: block; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-top: 8px;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input:focus { border-color: var(--accent); background: rgba(255,77,109,0.06); }
  input::placeholder { color: var(--muted); }
  .btn {
    width: 100%; padding: 15px; background: var(--accent); border: none;
    border-radius: 12px; color: white; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 15px; letter-spacing: 0.5px; cursor: pointer;
    margin-top: 8px; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 24px rgba(255,77,109,0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,77,109,0.4); }
  .btn:active { transform: translateY(0); }
  .result { display: none; text-align: center; animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1); }
  .names-display { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 28px; }
  .names-display span { color: var(--accent); }
  .meter-wrap { position: relative; margin: 20px 0 28px; }
  .meter-bar { height: 14px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .meter-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #ff4d6d, #ff8fa3); width: 0%; transition: width 1.8s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 0 16px rgba(255,77,109,0.5); }
  .percent { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin: 16px 0 8px; }
  .verdict { font-size: 16px; color: var(--accent2); font-weight: 500; margin-bottom: 8px; }
  .fun-comment { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .btn-again { background: transparent; border: 1px solid var(--border); color: var(--muted); box-shadow: none; font-size: 13px; padding: 12px; }
  .btn-again:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; transform: none; }
  .admin-page { display: none; animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1); }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .admin-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .admin-badge { background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px; letter-spacing: 1px; }
  .entry { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .entry-names { font-size: 14px; font-weight: 500; }
  .entry-names .crush { color: var(--accent); }
  .entry-score { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); }
  .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 0; }
  .admin-login { display: none; animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1); }
  .back-btn { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; width: auto; box-shadow: none; }
  .back-btn:hover { color: var(--text); transform: none; box-shadow: none; }
  .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }
  .admin-scroll { max-height: 340px; overflow-y: auto; }
  .admin-scroll::-webkit-scrollbar { width: 4px; }
  .admin-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <!-- Main Form -->
    <div id="formScreen">
      <div class="logo">
        <span class="logo-icon">💘</span>
        <h1>Love Meter</h1>
        <p class="subtitle">Find out your compatibility score</p>
      </div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="yourName" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Their Name</label>
        <input type="text" id="crushName" placeholder="Enter their name" autocomplete="off">
      </div>
      <button class="btn" onclick="calculate()">Calculate 💘</button>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="result">
      <div class="names-display" id="namesDisplay"></div>
      <div class="meter-wrap">
        <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
      </div>
      <div class="percent" id="percentDisplay">0%</div>
      <div class="verdict" id="verdictDisplay"></div>
      <div class="fun-comment" id="commentDisplay"></div>
      <button class="btn btn-again" onclick="tryAgain()">Try Again</button>
    </div>

    <!-- Admin Login -->
    <div id="adminLogin" class="admin-login">
      <button class="back-btn" onclick="showForm()">← Back</button>
      <div class="logo">
        <span class="logo-icon">🔐</span>
        <h1>Admin</h1>
        <p class="subtitle">Enter secret password</p>
      </div>
      <div class="form-group" style="margin-top:24px">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="••••••••" autocomplete="off">
      </div>
      <button class="btn" onclick="checkAdmin()">Enter</button>
    </div>

    <!-- Admin Page -->
    <div id="adminPage" class="admin-page">
      <button class="back-btn" onclick="showForm()">← Back</button>
      <div class="admin-header">
        <div class="admin-title">All Results 😏</div>
        <div class="admin-badge">SECRET</div>
      </div>
      <div class="admin-scroll">
        <div id="entriesList"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🔥 YOUR FIREBASE CONFIG - Nitin replace this with your own!
  const firebaseConfig = {
  apiKey: "AIzaSyD1UqYnaQ2oa89Nc4xuSZ-MJdmMrZxg-ys",
  authDomain: "lovemeter-15d9f.firebaseapp.com",
  databaseURL: "https://lovemeter-15d9f-default-rtdb.firebaseio.com",
  projectId: "lovemeter-15d9f",
  storageBucket: "lovemeter-15d9f.firebasestorage.app",
  messagingSenderId: "578261920165",
  appId: "1:578261920165:web:74a798baa98cfd3433e04c",
  measurementId: "G-H11F76X21P"
};


  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const entriesRef = ref(db, 'entries');

  // Make these available globally
  window.saveEntry = (entry) => push(entriesRef, entry);
  window.listenEntries = (callback) => onValue(entriesRef, callback);
</script>

<script>
  const verdicts = {
    high: ["Perfect Match!", "Made for each other!", "Unbeatable duo!"],
    mid: ["Pretty good vibes!", "Worth a shot!", "Could work out!"],
    low: ["Hmm... maybe not?", "It's complicated.", "Keep searching!"],
    zero: ["Bro... no.", "Hard pass.", "Not happening 💀"]
  };
  const comments = {
    high: ["The universe clearly has plans for you two. 🌌", "Your friends already saw this coming. 👀", "Someone confess already. 😤"],
    mid: ["There's definitely something there... 👀", "Give it a chance, you never know!", "The vibe is real, just needs time."],
    low: ["Sometimes opposites attract... sometimes they don't.", "Friendship goals at least? 🤝", "There are 8 billion people out there."],
    zero: ["This algorithm doesn't lie. 💀", "Maybe in another life.", "Just... no. 😭"]
  };

  function getCategory(score) {
    if (score >= 75) return 'high';
    if (score >= 50) return 'mid';
    if (score >= 25) return 'low';
    return 'zero';
  }
  function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function generateScore(name1, name2) {
    const combined = (name1 + name2).toLowerCase().replace(/\s/g, '');
    let hash = 0;
    for (let c of combined) hash = (hash * 31 + c.charCodeAt(0)) % 100;
    return Math.max(10, Math.min(97, hash));
  }

  function calculate() {
    const name1 = document.getElementById('yourName').value.trim();
    const name2 = document.getElementById('crushName').value.trim();
    if (!name1 || !name2) { alert('Enter both names!'); return; }

    const score = generateScore(name1, name2);
    const cat = getCategory(score);

    // Save to Firebase!
    const entry = {
      name1, name2, score,
      time: new Date().toLocaleString('en-IN')
    };
    if (window.saveEntry) {
      window.saveEntry(entry).catch(() => {});
    }

    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('namesDisplay').innerHTML = `<span>${name1}</span> & <span>${name2}</span>`;
    document.getElementById('verdictDisplay').textContent = getRandom(verdicts[cat]);
    document.getElementById('commentDisplay').textContent = getRandom(comments[cat]);

    setTimeout(() => { document.getElementById('meterFill').style.width = score + '%'; }, 100);

    let current = 0;
    const interval = setInterval(() => {
      current += 2;
      if (current >= score) { current = score; clearInterval(interval); }
      document.getElementById('percentDisplay').textContent = current + '%';
    }, 30);
  }

  function tryAgain() {
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('formScreen').style.display = 'block';
    document.getElementById('yourName').value = '';
    document.getElementById('crushName').value = '';
    document.getElementById('meterFill').style.width = '0%';
  }

  function showForm() {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminPage').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('formScreen').style.display = 'block';
  }

  function showAdminLogin() {
    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('adminLogin').style.display = 'block';
  }

  function checkAdmin() {
    const pass = document.getElementById('adminPass').value;
    if (pass === 'nitin123') {
      document.getElementById('adminLogin').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      loadEntries();
    } else {
      alert('Wrong password!');
    }
  }

  function loadEntries() {
    const list = document.getElementById('entriesList');
    if (!window.listenEntries) {
      list.innerHTML = '<div class="empty-state">Database not connected yet!<br>Follow setup steps.</div>';
      return;
    }
    window.listenEntries((snapshot) => {
      const data = snapshot.val();
      if (!data) {
        list.innerHTML = '<div class="empty-state">No results yet!<br>Share the link 😄</div>';
        return;
      }
      const entries = Object.values(data).reverse();
      list.innerHTML = entries.map(e => `
        <div class="entry">
          <div class="entry-names">
            ${e.name1} ❤️ <span class="crush">${e.name2}</span>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${e.time}</div>
          </div>
          <div class="entry-score">${e.score}%</div>
        </div>
      `).join('');
    });
  }

  // Make functions global
  window.calculate = calculate;
  window.tryAgain = tryAgain;
  window.showForm = showForm;
  window.showAdminLogin = showAdminLogin;
  window.checkAdmin = checkAdmin;

  // Secret shortcut Alt+0
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('formScreen').style.display !== 'none') calculate();
      if (document.getElementById('adminLogin').style.display !== 'none') checkAdmin();
    }
    if (e.altKey && e.key === '0') showAdminLogin();
  });
</script>
</body>
</html>
